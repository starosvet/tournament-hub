<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tournament Hub v4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🏆 Tournament Hub v4</h1>

  <div id="info"></div>
  <div id="match"></div>

</div>

<script src="state.js"></script>
<script src="engine.js"></script>
<script src="time.js"></script>
<script src="app.js"></script>

<script>
function render() {
  const match = state.matches[state.currentMatch];

  document.getElementById("info").innerHTML =
    `Round: ${state.round} | Match ${state.currentMatch + 1}`;

  document.getElementById("match").innerHTML = `
    <div class="card">
      <a href="${match.a.url}" target="_blank">${match.a.name}</a>
      <button onclick="handleVote('A')">Vote</button>
    </div>

    <div class="card">
      <a href="${match.b.url}" target="_blank">${match.b.name}</a>
      <button onclick="handleVote('B')">Vote</button>
    </div>
  `;
}

init();
</script>

</body>
</html>
