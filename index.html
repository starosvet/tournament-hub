<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <main class="container page-enter">
        <section class="hero">
            <h1 data-site-name>Tournament Hub</h1>
            <p id="site-description">Турниры для вашей вики</p>
        </section>

        <section>
            <h2>Турниры</h2>
            <div id="tournament-list">
                <p style="color:var(--text-3);text-align:center;padding:40px;">Загрузка...</p>
            </div>
        </section>

        <section id="stats" style="margin-top:32px;">
            <p style="color:var(--text-3);">Загрузка статистики...</p>
        </section>
    </main>

    <footer style="text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;">
        <p id="footerText">© 2026 Tournament Hub</p>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/elo.js"></script>
    <script src="js/tournament.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/export.js"></script>
    <script src="js/render.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (window.Auth) Auth.checkFandomAutoAdmin();
            if (window.Render) Render.initRender();
            if (window.Auth) Auth.renderNavUser();
            
            const adminLink = document.getElementById("navAdmin");
            if (adminLink && window.Auth && Auth.isAdmin()) {
                adminLink.classList.remove("hidden");
            }
            
            // Брендинг
            const db = DB.getDB();
            const name = db.settings?.siteName || "Tournament Hub";
            const logo = db.settings?.siteLogo || "🏆";
            document.title = name;
            document.getElementById("siteLogoLink").textContent = logo + " " + name;
            document.getElementById("footerText").textContent = "© " + new Date().getFullYear() + " " + name;
        });
    </script>
</body>
</html>
