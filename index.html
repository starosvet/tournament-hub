<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tournament Hub v5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🏆 Tournament Hub v5</h1>

  <button onclick="nextRound()">Next Round</button>

  <div id="view"></div>

</div>

<script src="state.js"></script>
<script src="engine.js"></script>
<script src="import.js"></script>
<script src="app.js"></script>

<script>
function render() {
  const round = state.rounds[state.currentRoundIndex];

  if (!round) return;

  document.getElementById("view").innerHTML =
    round.groups.map((g, gi) => `
      <div class="group">
        <h2>Group ${g.id}</h2>

        ${g.matches.map((m, mi) => `
          <div class="match">
            <a href="${m.a.url}" target="_blank">${m.a.name}</a>
            <button onclick="registerVote(${gi}, ${mi}, 'A')">A</button>

            <span>VS</span>

            <a href="${m.b.url}" target="_blank">${m.b.name}</a>
            <button onclick="registerVote(${gi}, ${mi}, 'B')">B</button>

            <div class="score">
              ${m.votesA} - ${m.votesB}
            </div>

            ${m.winner ? `<b>Winner: ${m.winner.name}</b>` : ""}
          </div>
        `).join("")}
      </div>
    `).join("");
}

init();
</script>

</body>
</html>
