<!DOCTYPE html>
<html>
<head>
  <title>Tournament Hub v3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🏆 Tournament Hub v3</h1>
  <h3 id="round"></h3>

  <div id="match"></div>

</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="state.js"></script>
<script src="core.js"></script>

<script>
function render() {
  document.getElementById("round").innerText =
    "Round " + state.round;

  let match = state.matches[state.currentMatch];

  let box = document.getElementById("match");

  if (!match) return;

  box.innerHTML = `
    <div class="card">
      <h2>${match.type.toUpperCase()}</h2>

      ${match.players.map(p =>
        `<button onclick="vote('${p.name}', '${match.players.find(x=>x.name!==p.name)?.name || ''}')">
          ${p.name}
        </button>`
      ).join("")}
    </div>
  `;
}

render();
</script>

</body>
</html>
