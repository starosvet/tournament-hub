<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-site-name>Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/oauth-init.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/render.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html" class="active">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>
    <div class="container">
        <div class="hero-empty page-enter">
            <h2>Турниры для вашей вики</h2>
            <p id="site-description">Создавайте, голосуйте, наслаждайтесь!</p>
        </div>

        <div class="grid-2" style="margin-top:28px;">
            <div>
                <h2 class="section-title">🏆 Турниры</h2>
                <div id="tournament-list">
                    <!-- Карточки турниров рендерятся через render.js -->
                </div>
            </div>
            <div>
                <h2 class="section-title">📰 Новости</h2>
                <div class="news-column" id="news-column">
                    <!-- Новости загружаются через JS -->
                </div>
            </div>
        </div>

        <h2 class="section-title" style="margin-top:40px;">📊 Статистика</h2>
        <div id="stats">
            <!-- Статистика рендерится через render.js -->
        </div>
    </div>
    <footer><p id="footerText">Tournament Hub — турнирный движок для вики</p></footer>
    <script>
    document.addEventListener("DOMContentLoaded", async function() {
        let attempts = 0;
        const waitForInit = setInterval(() => {
            if (window.TH && window.TH.isReady) {
                clearInterval(waitForInit);
                // Показываем админ-ссылку только если пользователь админ
                if (window.Auth && window.Auth.isAdmin) {
                    window.Auth.isAdmin().then(isAdmin => {
                        const navAdmin = document.getElementById("navAdmin");
                        if (navAdmin) {
                            if (isAdmin) navAdmin.classList.remove("hidden");
                            else navAdmin.classList.add("hidden");
                        }
                    });
                }
                if (window.Auth && window.Auth.renderNavUser) window.Auth.renderNavUser();
                if (window.Render && window.Render.initRender) window.Render.initRender();
                loadNews();
            }
            attempts++;
            if (attempts > 60) clearInterval(waitForInit);
        }, 100);
    });

    async function loadNews() {
        try {
            const { data: news } = await window.TH.getNews(5);
            const container = document.getElementById("news-column");
            if (!container) return;
            if (!news || !news.length) {
                container.innerHTML = '<p style="color:var(--text-3);text-align:center;padding:20px;">Нет новостей</p>';
                return;
            }
            container.innerHTML = news.map(n => `
                <div class="news-item">
                    <div class="news-title">${window.DB.escapeHTML(n.title)}</div>
                    ${n.image_url ? `<img src="${window.DB.escapeHTML(n.image_url)}" class="news-image" onerror="this.style.display='none'">` : ''}
                    <div class="news-excerpt">${window.DB.escapeHTML(n.content.substring(0, 150))}${n.content.length > 150 ? '…' : ''}</div>
                    <div class="news-meta"><span>📅 ${new Date(n.published_at).toLocaleDateString('ru-RU')}</span></div>
                </div>
            `).join('');
        } catch (e) { console.warn('News load error', e); }
    }
    </script>
</body>
</html>
