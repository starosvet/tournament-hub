<script>
    function escapeHTML(text) {
        if (!text) return "";
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function attrValue(str) {
        return String(str || "").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    let currentUserData = null;

    async function loadProfile() {
        const user = await DB.getCurrentUser();
        const box = document.getElementById("profileContent");
        currentUserData = user;

        if (!user) {
            box.innerHTML = `
                <p style="color:var(--text-3);margin-bottom:20px;">Вы не авторизованы</p>
                <a href="login.html" class="btn-primary">🔐 Войти</a>
            `;
            document.getElementById("fandomLinkBox").style.display = "none";
            document.getElementById("fandomLinkedBox").style.display = "none";
            return;
        }

        // FIX: await для async isAdmin
        const isAdmin = await window.TH.isAdmin();
        const fandomLinked = await FandomAuth.isFandomLinked();
        const fandomName = await FandomAuth.getLinkedFandomName();

        // Показываем/скрываем блоки Fandom
        if (fandomLinked && fandomName) {
            document.getElementById("fandomLinkBox").style.display = "none";
            document.getElementById("fandomLinkedBox").style.display = "block";
            document.getElementById("linkedFandomName").textContent = fandomName;
        } else {
            document.getElementById("fandomLinkBox").style.display = "block";
            document.getElementById("fandomLinkedBox").style.display = "none";
            document.getElementById("fandomCurrentUsername").textContent = user.username || user.displayName || '—';
        }

        box.innerHTML = `
            <div style="margin-bottom:24px;">
                <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Никнейм</label>
                <div style="font-size:1.3em;font-weight:700;">${escapeHTML(user.username)}</div>
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Email</label>
                <div style="font-size:1.1em;">${escapeHTML(user.email || '—')}</div>
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Отображаемое имя</label>
                <input type="text" id="displayName" value="${attrValue(user.displayName || user.username)}" style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px;color:var(--text);">
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Голосов отдано</label>
                <div style="font-size:1.1em;">${user.votes || 0}</div>
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Роль</label>
                <div style="font-size:1.1em;text-transform:capitalize;">
                    ${isAdmin ? "👑 Администратор" : (user.role || "user")}
                    ${fandomLinked ? ' <span style="color:var(--green);font-size:0.8em;">✓ Fandom</span>' : ''}
                </div>
            </div>
            <button class="btn-primary" onclick="saveProfile()">💾 Сохранить</button>
            <button class="btn-danger" style="margin-left:12px;" onclick="Auth.logout();">🚪 Выйти</button>
        `;
    }

    async function saveProfile() {
        const user = await DB.getCurrentUser();
        if (!user) return;

        const newName = document.getElementById("displayName").value.trim();
        if (!newName) return;

        try {
            await window.TH.updateProfile({
                display_name: newName
            });

            user.displayName = newName;
            DB.setCurrentUser(user);

            toast("Сохранено!");
            Auth.renderNavUser();
        } catch (e) {
            toast("Ошибка: " + e.message);
        }
    }

    /* ========== FANDOM LINK FUNCTIONS ========== */

    function startFandomLink() {
        const name = document.getElementById("fandomName").value.trim();
        const err = document.getElementById("fandomError");
        err.textContent = "";

        if (!currentUserData) {
            err.textContent = "Ошибка: пользователь не определён. Перезагрузите страницу.";
            return;
        }

        const result = FandomAuth.startFandomLink(name, currentUserData.username || currentUserData.displayName);
        if (!result.ok) {
            err.textContent = result.error;
            return;
        }

        document.getElementById("fandomStep1").style.display = "none";
        document.getElementById("fandomStep2").style.display = "block";
        document.getElementById("fandomCode").textContent = result.code;
    }

    function cancelFandomLink() {
        FandomAuth.cancelFandomLink();
        document.getElementById("fandomStep1").style.display = "block";
        document.getElementById("fandomStep2").style.display = "none";
        document.getElementById("fandomStep3").style.display = "none";
        document.getElementById("fandomStatus").textContent = "";
        document.getElementById("fandomProgress").textContent = "";
        document.getElementById("fandomError").textContent = "";
        document.getElementById("fandomName").value = "";
    }

    async function checkFandomLink() {
        const status = document.getElementById("fandomStatus");
        const progress = document.getElementById("fandomProgress");
        const err = document.getElementById("fandomError");
        status.textContent = "⏳ Проверяем правки...";
        err.textContent = "";

        FandomAuth.pollFandomLink(
            async function(result) {
                status.textContent = "✅ Код подтверждён! Сохраняем...";
                progress.textContent = "";

                const complete = await FandomAuth.completeFandomLink(result.fandomName);
                if (complete.ok) {
                    document.getElementById("fandomStep2").style.display = "none";
                    document.getElementById("fandomStep3").style.display = "block";
                    setTimeout(() => {
                        location.reload();
                    }, 1500);
                } else {
                    err.textContent = complete.error || "Ошибка сохранения";
                    status.textContent = "";
                }
            },
            function(errorMsg) {
                status.textContent = "";
                progress.textContent = "";
                err.textContent = errorMsg;
            },
            function(current, max) {
                progress.textContent = "Проверка " + current + "/" + max;
            }
        );
    }

    document.addEventListener("DOMContentLoaded", async function() {
        if (window.TH) {
            window.TH.init();
            await DB.syncSupabaseUser();
        }
        await loadProfile();
        Auth.renderNavUser();
        Auth.checkFandomAutoAdmin();
        // FIX: Используем isAdminSync
        const navAdmin = document.getElementById("navAdmin");
        if (navAdmin && Auth.isAdminSync && Auth.isAdminSync()) navAdmin.classList.remove("hidden");
    });
</script>
