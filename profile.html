<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html" class="active">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container">
        <div id="profileBox" class="login-box page-enter" style="max-width:600px;">
            <h2>👤 Профиль</h2>
            <div id="profileContent">Загрузка профиля...</div>
        </div>
    </div>

    <footer>
        <p>Tournament Hub</p>
    </footer>

    <script>
        function escapeHTML(text) {
            if (!text) return "";
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Безопасное значение для input value (двойное экранирование кавычек)
        function attrValue(str) {
            return String(str || "").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function loadProfile() {
            const user = DB.getCurrentUser();
            const box = document.getElementById("profileContent");

            if (!user) {
                box.innerHTML = `
                    <p style="color:var(--text-3);margin-bottom:20px;">Вы не авторизованы</p>
                    <a href="login.html" class="btn-primary">🔐 Войти</a>
                `;
                return;
            }

            const isAdmin = Auth.isAdmin();

            box.innerHTML = `
                <div style="margin-bottom:24px;">
                    <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Никнейм</label>
                    <div style="font-size:1.3em;font-weight:700;">${escapeHTML(user.username)}</div>
                </div>
                <div style="margin-bottom:24px;">
                    <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Отображаемое имя</label>
                    <input type="text" id="displayName" value="${attrValue(user.displayName || user.username)}" style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px;color:var(--text);">
                </div>
                <div style="margin-bottom:24px;">
                    <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Голосов отдано</label>
                    <div style="font-size:1.1em;">${user.votes || 0}</div>
                </div>
                <div style="margin-bottom:24px;">
                    <label style="display:block;color:var(--text-2);font-size:13px;margin-bottom:6px;">Роль</label>
                    <div style="font-size:1.1em;text-transform:capitalize;">${isAdmin ? "👑 Администратор" : (user.role || "user")}</div>
                </div>
                <button class="btn-primary" onclick="saveProfile()">💾 Сохранить</button>
                <button class="btn-danger" style="margin-left:12px;" onclick="Auth.logout();location.reload();">🚪 Выйти</button>
            `;
        }

        function saveProfile() {
            const user = DB.getCurrentUser();
            if (!user) return;

            const newName = document.getElementById("displayName").value.trim();
            if (!newName) return;

            DB.updateDB(db => {
                const u = db.users.find(x => x.id === user.id);
                if (u) {
                    u.displayName = newName;
                    user.displayName = newName;
                }
            });

            alert("Сохранено!");
            Auth.renderNavUser();
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadProfile();
            Auth.renderNavUser();
            Auth.checkFandomAutoAdmin();
            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin && Auth.isAdmin()) navAdmin.classList.remove("hidden");
        });
    </script>
</body>
</html>
