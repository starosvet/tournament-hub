<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/elo.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container page-enter">
        <div id="profileContent">
            <p style="color:var(--text-3);text-align:center;padding:60px;">Загрузка профиля...</p>
        </div>
    </div>

    <footer>
        <p id="footerText">© 2026 Tournament Hub</p>
    </footer>

    <script>
        function loadProfile() {
            let db = getDB();
            updateSiteBranding();
            renderNavUser(db);
            renderAdminLink();

            let params = new URLSearchParams(location.search);
            let userId = params.get('id');
            let isMyProfile = false;
            
            let currentUser = getCurrentUser();
            if (!userId && currentUser) {
                userId = currentUser.id;
                isMyProfile = true;
            }
            
            let user = db.users.find(u => u.id === userId);
            if (!user) {
                document.getElementById('profileContent').innerHTML = `
                    <div class="hero-empty" style="padding:80px 20px;">
                        <h2>😕 Пользователь не найден</h2>
                        <p style="color:var(--text-3);">Такого профиля не существует</p>
                        <a href="index.html" class="btn-primary" style="margin-top:20px;text-decoration:none;display:inline-block;">На главную</a>
                    </div>
                `;
                return;
            }

            let isAdminView = isAdmin();
            let canEdit = isMyProfile || isAdminView;
            let roleText = user.role === 'admin' ? '👑 Администратор' : user.role === 'moderator' ? '🛡️ Модератор' : '👤 Пользователь';
            let roleColor = user.role === 'admin' ? 'var(--accent)' : user.role === 'moderator' ? 'var(--blue)' : 'var(--text-3)';
            
            let elo = getElo(user.id);
            let totalVotes = user.votes ? user.votes.length : 0;
            let fandomLink = user.wikiDomain ? `https://${user.wikiDomain}/wiki/User:${encodeURIComponent(user.fandomName)}` : null;

            let html = `
                <div style="display:grid;grid-template-columns:280px 1fr;gap:24px;">
                    <!-- Левая колонка -->
                    <div>
                        <div class="card" style="text-align:center;padding:32px 20px;">
                            <div style="width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:3em;font-weight:800;color:white;margin:0 auto 16px;box-shadow:0 0 40px var(--accent-glow);">
                                ${(user.displayName || user.fandomName || '?').charAt(0).toUpperCase()}
                            </div>
                            <h2 style="font-size:1.5em;margin-bottom:8px;">${escapeHtml(user.displayName || user.fandomName || 'Пользователь')}</h2>
                            <p style="color:${roleColor};font-weight:700;font-size:14px;margin-bottom:16px;">${roleText}</p>
                            
                            ${user.authType === 'fandom' ? `
                                <div style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);border-radius:12px;padding:10px;margin-bottom:16px;">
                                    <span style="color:var(--green);font-size:13px;font-weight:600;">✓ Подтверждённый Fandom</span>
                                    ${fandomLink ? `<br><a href="${fandomLink}" target="_blank" style="color:var(--blue);font-size:12px;">Профиль на вики →</a>` : ''}
                                </div>
                            ` : `
                                <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:16px;">
                                    <span style="color:var(--text-3);font-size:13px;">👤 Гостевой аккаунт</span>
                                </div>
                            `}
                            
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;">
                                <div style="background:var(--bg);border-radius:12px;padding:12px;">
                                    <div style="font-size:1.5em;font-weight:800;color:var(--accent);">${elo}</div>
                                    <div style="color:var(--text-3);font-size:11px;">Elo рейтинг</div>
                                </div>
                                <div style="background:var(--bg);border-radius:12px;padding:12px;">
                                    <div style="font-size:1.5em;font-weight:800;color:var(--blue);">${totalVotes}</div>
                                    <div style="color:var(--text-3);font-size:11px;">Голосов</div>
                                </div>
                            </div>
                        </div>
                        
                        ${canEdit ? `
                            <div class="card" style="margin-top:16px;">
                                <h3 style="font-size:1em;margin-bottom:12px;">✏️ Редактировать</h3>
                                <label style="display:block;color:var(--text-2);font-size:12px;margin-bottom:6px;">О себе</label>
                                <textarea id="editBio" maxlength="300" style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px;color:var(--text);font-family:inherit;resize:vertical;min-height:80px;font-size:14px;">${escapeHtml(user.bio || '')}</textarea>
                                <button class="btn-primary" style="width:100%;margin-top:10px;font-size:13px;padding:10px;" onclick="saveBio()">💾 Сохранить</button>
                            </div>
                        ` : (user.bio ? `
                            <div class="card" style="margin-top:16px;">
                                <h3 style="font-size:1em;margin-bottom:8px;">📝 О себе</h3>
                                <p style="color:var(--text-2);font-size:14px;line-height:1.6;">${escapeHtml(user.bio)}</p>
                            </div>
                        ` : '')}
                    </div>
                    
                    <!-- Правая колонка -->
                    <div>
                        <div class="card" style="margin-bottom:16px;">
                            <h3 style="font-size:1.1em;margin-bottom:16px;">📊 Статистика голосования</h3>
                            ${renderVoteHistory(user)}
                        </div>
                        
                        ${isAdminView && !isMyProfile ? `
                            <div class="card danger-zone" style="border-color:rgba(239,68,68,0.3);">
                                <h3 style="font-size:1.1em;margin-bottom:12px;color:var(--red);">🛡️ Админ-инструменты</h3>
                                <div class="btn-row">
                                    <button class="btn-secondary" onclick="setUserRole('${user.id}', 'moderator')">Сделать модератором</button>
                                    <button class="btn-secondary" onclick="setUserRole('${user.id}', 'user')">Снять роль</button>
                                    <button class="btn-danger" onclick="deleteUser('${user.id}')">Удалить пользователя</button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = html;
        }

        function renderVoteHistory(user) {
            if (!user.votes || !user.votes.length) {
                return '<p style="color:var(--text-3);font-size:14px;">Пока нет голосов</p>';
            }
            
            let db = getDB();
            let html = '<div style="display:flex;flex-direction:column;gap:8px;">';
            
            // Группируем по турнирам
            let byTournament = {};
            user.votes.forEach(v => {
                if (!byTournament[v.tournamentId]) byTournament[v.tournamentId] = [];
                byTournament[v.tournamentId].push(v);
            });
            
            Object.entries(byTournament).forEach(([tId, votes]) => {
                let t = db.tournaments.find(x => x.id === tId);
                let tName = t ? t.name : 'Неизвестный турнир';
                html += `<div style="margin-bottom:12px;">`;
                html += `<h4 style="color:var(--accent);font-size:14px;margin-bottom:8px;">${escapeHtml(tName)}</h4>`;
                
                votes.forEach(v => {
                    let side = v.side === 0 ? 'A' : 'B';
                    let time = new Date(v.time).toLocaleDateString('ru-RU');
                    html += `<div style="padding:8px 12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text-2);">Раунд ${v.roundIdx + 1}, матч ${v.matchIdx + 1} — голос за сторону ${side} <span style="color:var(--text-3);float:right;">${time}</span></div>`;
                });
                
                html += `</div>`;
            });
            
            html += '</div>';
            return html;
        }

        function saveBio() {
            let bio = document.getElementById('editBio').value.trim();
            let user = getCurrentUser();
            if (!user) return;
            
            let db = getDB();
            let u = db.users.find(x => x.id === user.id);
            if (u) {
                u.bio = bio;
                saveDB(db);
                toast('Био сохранено!');
            }
        }

        function setUserRole(userId, role) {
            if (!isAdmin()) { toast('Нет доступа'); return; }
            let db = getDB();
            let u = db.users.find(x => x.id === userId);
            if (u) {
                u.role = role;
                saveDB(db);
                toast(`Роль изменена на: ${role}`);
                loadProfile();
            }
        }

        function deleteUser(userId) {
            if (!isAdmin()) return;
            if (!confirm('УДАЛИТЬ пользователя? Все его данные будут потеряны!')) return;
            let db = getDB();
            db.users = db.users.filter(u => u.id !== userId);
            saveDB(db);
            toast('Пользователь удалён');
            location.href = 'index.html';
        }

        function updateSiteBranding() {
            let db = getDB();
            let name = db.settings?.siteName || 'Tournament Hub';
            let logo = db.settings?.siteLogo || '🏆';
            document.title = name + ' — Профиль';
            let logoLink = document.getElementById('siteLogoLink');
            if (logoLink) logoLink.textContent = logo + ' ' + name;
            let ft = document.getElementById('footerText');
            if (ft) ft.textContent = '© ' + new Date().getFullYear() + ' ' + name;
        }

        loadProfile();
        initAuth();
    </script>
</body>
</html>
