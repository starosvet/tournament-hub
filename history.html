<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html" class="active">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">📜 История матчей</h1>

        <h2 class="section-title">📊 Статистика</h2>
        <div id="history-stats" class="card" style="margin-bottom:28px;">
            <div class="skeleton" style="height:60px;"></div>
        </div>

        <h2 class="section-title">🏆 Завершённые турниры</h2>
        <div id="finished-tournaments">
            <div class="skeleton" style="height:120px;border-radius:14px;"></div>
        </div>

        <h2 class="section-title" style="margin-top:40px;">⚔️ История матчей</h2>
        <div id="match-history">
            <div class="skeleton" style="height:80px;border-radius:14px;"></div>
        </div>
    </div>

    <footer>
        <p>Tournament Hub</p>
    </footer>

    <script>
        function loadHistory() {
            const db = DB.getDB();

            // Статистика
            const finished = (db.tournaments || []).filter(t => t.status === "finished");
            const totalMatches = (db.matches || []).filter(m => m.finished).length;
            const totalVotes = (db.matches || []).reduce((sum, m) => sum + (m.votes1 || 0) + (m.votes2 || 0), 0);

            document.getElementById("history-stats").innerHTML = `
                <div style="display:flex;gap:20px;flex-wrap:wrap;">
                    <div class="stat-badge">🏆 Завершено турниров: ${finished.length}</div>
                    <div class="stat-badge">⚔️ Матчей сыграно: ${totalMatches}</div>
                    <div class="stat-badge">🗳️ Всего голосов: ${totalVotes}</div>
                </div>
            `;

            // Завершённые турниры
            const ftContainer = document.getElementById("finished-tournaments");
            if (!finished.length) {
                ftContainer.innerHTML = `<p style="color:var(--text-3);">Пока нет завершённых турниров</p>`;
            } else {
                ftContainer.innerHTML = finished.map(t => `
                    <div class="tournament-item" onclick="location.href='bracket.html?id=${t.id}'">
                        <span class="ti-status completed"></span>
                        <div class="ti-info">
                            <h4>${escapeHTML(t.title)}</h4>
                            <span>${new Date(t.createdAt).toLocaleDateString("ru-RU")} · ${t.players?.length || 0} участников</span>
                        </div>
                    </div>
                `).join("");
            }

            // История матчей
            const mhContainer = document.getElementById("match-history");
            const doneMatches = (db.matches || []).filter(m => m.finished).sort((a, b) => (b.finishedAt || b.createdAt || 0) - (a.finishedAt || a.createdAt || 0));

            if (!doneMatches.length) {
                mhContainer.innerHTML = `<p style="color:var(--text-3);">Пока нет завершённых матчей</p>`;
            } else {
                mhContainer.innerHTML = doneMatches.slice(0, 50).map(m => {
                    const p1Name = escapeHTML(m.player1?.name || m.player1 || "—");
                    const p2Name = escapeHTML(m.player2?.name || m.player2 || "—");
                    const wName = escapeHTML(m.winner?.name || m.winner || "—");
                    const p1Img = m.player1?.image || "";
                    const p2Img = m.player2?.image || "";

                    return `
                        <div class="match-row">
                            <div class="mr-side ${m.winner === m.player1 ? 'win' : ''}">
                                ${p1Img ? `<img src="${escapeHTML(p1Img)}" alt="">` : ''}
                                <span>${p1Name}</span>
                            </div>
                            <div class="mr-center">
                                <span class="mr-score">${m.votes1 || 0} : ${m.votes2 || 0}</span>
                                <div class="mr-winner">🏆 ${wName}</div>
                            </div>
                            <div class="mr-side ${m.winner === m.player2 ? 'win' : ''}">
                                ${p2Img ? `<img src="${escapeHTML(p2Img)}" alt="">` : ''}
                                <span>${p2Name}</span>
                            </div>
                        </div>
                    `;
                }).join("");
            }
        }

        function escapeHTML(text) {
            if (!text) return "";
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadHistory();
            Auth.renderNavUser();
            Auth.checkFandomAutoAdmin();
            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin && Auth.isAdmin()) navAdmin.classList.remove("hidden");
        });
    </script>
</body>
</html>
