<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tournament.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container page-enter">
        <h1 class="page-title">📜 История матчей</h1>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
            <div class="card">
                <h3 style="color:var(--accent);margin-bottom:12px;">📊 Статистика</h3>
                <div id="statsBox">
                    <p style="color:var(--text-3);">Загрузка...</p>
                </div>
            </div>
            <div class="card">
                <h3 style="color:var(--accent);margin-bottom:12px;">🏆 Завершённые турниры</h3>
                <div id="completedTournaments">
                    <p style="color:var(--text-3);">Загрузка...</p>
                </div>
            </div>
        </div>

        <div id="historyContent">
            <p style="color:var(--text-3);text-align:center;padding:40px;">Загрузка истории...</p>
        </div>
    </div>

    <footer style="text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;">
        <p id="footerText">© 2026 Tournament Hub</p>
    </footer>

    <script>
        function escapeHTML(text) {
            if (text === null || text === undefined) return "";
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function loadHistory() {
            const db = DB.getDB();
            const tournaments = (db.tournaments || []).filter(t => t.status === "finished");
            const matches = db.matches || [];

            // Статистика
            const totalMatches = matches.filter(m => m.finished).length;
            const totalVotes = matches.reduce((sum, m) => sum + (m.votes1 || 0) + (m.votes2 || 0), 0);
            document.getElementById("statsBox").innerHTML = `
                <p style="color:var(--text-2);font-size:14px;line-height:1.8;">
                    Завершено матчей: <strong>${totalMatches}</strong><br>
                    Всего голосов: <strong>${totalVotes}</strong><br>
                    Турниров завершено: <strong>${tournaments.length}</strong>
                </p>
            `;

            // Завершённые турниры
            if (!tournaments.length) {
                document.getElementById("completedTournaments").innerHTML = '<p style="color:var(--text-3);">Пока нет завершённых турниров</p>';
            } else {
                document.getElementById("completedTournaments").innerHTML = tournaments.map(t => `
                    <div style="padding:10px;background:var(--bg);border-radius:8px;margin-bottom:8px;">
                        <a href="bracket.html?id=${encodeURIComponent(t.id)}" style="color:var(--accent);text-decoration:none;font-weight:600;">${escapeHTML(t.title)}</a>
                        <p style="color:var(--text-3);font-size:12px;margin-top:4px;">${new Date(t.createdAt).toLocaleDateString('ru-RU')}</p>
                    </div>
                `).join("");
            }

            // История матчей
            const finishedMatches = matches.filter(m => m.finished).sort((a, b) => (b.round || 0) - (a.round || 0));
            if (!finishedMatches.length) {
                document.getElementById("historyContent").innerHTML = '<p style="color:var(--text-3);text-align:center;padding:40px;">История пуста</p>';
                return;
            }

            const byRound = {};
            finishedMatches.forEach(m => {
                if (!byRound[m.round]) byRound[m.round] = [];
                byRound[m.round].push(m);
            });

            document.getElementById("historyContent").innerHTML = Object.entries(byRound).map(([round, ms]) => `
                <div class="card" style="margin-bottom:16px;">
                    <h3 style="color:var(--accent);margin-bottom:12px;">Раунд ${round}</h3>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        ${ms.map(m => `
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg);border-radius:10px;">
                                <div style="display:flex;align-items:center;gap:12px;">
                                    <span style="${m.winner === m.player1 ? 'color:var(--green);font-weight:700;' : 'color:var(--text-3);'}">${escapeHTML(m.player1 || '—')}</span>
                                    <span style="color:var(--text-3);">vs</span>
                                    <span style="${m.winner === m.player2 ? 'color:var(--green);font-weight:700;' : 'color:var(--text-3);'}">${escapeHTML(m.player2 || '—')}</span>
                                </div>
                                <span style="color:var(--accent);font-weight:700;font-size:14px;">${m.votes1 || 0} : ${m.votes2 || 0}</span>
                            </div>
                        `).join("")}
                    </div>
                </div>
            `).join("");
        }

        document.addEventListener("DOMContentLoaded", function() {
            const db = DB.getDB();
            const name = db.settings?.siteName || "Tournament Hub";
            const logo = db.settings?.siteLogo || "🏆";
            document.title = name + " — История";
            document.getElementById("siteLogoLink").textContent = logo + " " + name;
            document.getElementById("footerText").textContent = "© " + new Date().getFullYear() + " " + name;
            Auth.renderNavUser();
            const adminLink = document.getElementById("navAdmin");
            if (adminLink && Auth.isAdmin()) adminLink.classList.remove("hidden");
            loadHistory();
        });
    </script>
</body>
</html>
