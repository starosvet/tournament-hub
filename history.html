<h1>🏆 Tournament History</h1>

<div id="history"></div>

<script src="state.js"></script>

<script>
const history = loadHistory();

document.getElementById("history").innerHTML =
  history.map(h => `
    <div class="card">
      <h3>Round ${h.round}</h3>
      <p>Winners:</p>
      <ul>
        ${h.winners.map(w => `<li>${w.name}</li>`).join("")}
      </ul>
    </div>
  `).join("");
</script>
