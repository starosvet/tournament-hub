<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>История | Tournament Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">🏆 Tournament Hub</a>
    <nav>
      <a href="index.html">Главная</a>
      <a href="bracket.html">Сетка</a>
      <a href="history.html" class="active">История</a>
      <a href="rules.html">Правила</a>
      <a href="admin.html" id="navAdmin" class="hidden">Управление</a>
    </nav>
    <div id="navUser" class="nav-user"></div>
  </div>
</header>

<main class="container">
  <h1 class="page-title">📜 История матчей</h1>
  <div id="historyList"></div>
</main>

<footer>
  <span id="footerText">Tournament Hub</span>
</footer>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script src="js/auth.js"></script>
<script src="js/render.js"></script>

<script>
function loadHistoryPage() {
  let db = getDB();
  renderNavUser(db);
  renderHistory(db);
  renderAdminLink();
}

function renderHistory(db) {
  let el = document.getElementById("historyList");
  if (!el) return;
  
  let t = getActiveTournament(db);
  if (!t || !t.rounds) {
    el.innerHTML = '<div class="hero-empty"><h2>Нет истории</h2><p>Пока не проведено ни одного матча.</p></div>';
    return;
  }
  
  let html = '';
  t.rounds.forEach((r, idx) => {
    let done = r.matches.filter(m => m.done);
    if (!done.length) return;
    
    html += '<div class="round-block"><h2>' + r.name + '</h2>';
    done.forEach(m => {
      let wa = m.winner && m.winner.id === m.a.id;
      let wb = m.winner && m.winner.id === m.b.id;
      html += '<div class="match-row">' +
        '<div class="mr-side ' + (wa ? 'win' : '') + '">' +
        '<img src="' + (m.a.img || '') + '" onerror="this.style.display=\'none\'">' +
        '<span>' + m.a.name + '</span></div>' +
        '<div class="mr-center"><span class="mr-score">' + m.votesA + ' : ' + m.votesB + '</span>' +
        '<span class="mr-winner">🏆 ' + (m.winner ? m.winner.name : '—') + '</span></div>' +
        '<div class="mr-side ' + (wb ? 'win' : '') + '">' +
        '<img src="' + (m.b.img || '') + '" onerror="this.style.display=\'none\'">' +
        '<span>' + m.b.name + '</span></div>' +
        '</div>';
    });
    html += '</div>';
  });
  
  if (!html) {
    el.innerHTML = '<div class="hero-empty"><h2>Нет истории</h2><p>Пока не проведено ни одного матча.</p></div>';
  } else {
    el.innerHTML = html;
  }
}

loadHistoryPage();
</script>

</body>
</html>
