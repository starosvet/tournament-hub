<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Tournament Hub</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0f1115; color: #eaeaea; font-family: Arial, sans-serif; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .panel { background: #171a21; border: 1px solid #2a2f3a; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    button { background: #2d6cdf; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; margin: 3px; }
    button:hover { background: #1f5ed0; }
    input, textarea { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #0f1115; color: #fff; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
    .log { font-size: 12px; opacity: 0.8; white-space: pre-wrap; }
    .hidden { display: none !important; }
    .danger { background: #ef4444 !important; }
    .danger:hover { background: #dc2626 !important; }
  </style>
</head>
<body>
<div class="wrap">

  <h1>⚙️ Tournament Hub Admin</h1>

  <!-- AUTH -->
  <div class="panel" id="authPanel">
    <h3>Авторизация</h3>
    <input id="adminPass" type="password" placeholder="Пароль админа"/>
    <button onclick="doLoginAdmin()">Войти</button>
    <div id="authStatus" class="log"></div>
  </div>

  <!-- ADMIN CONTROLS (скрыты до входа) -->
  <div id="adminControls" class="hidden">

    <!-- TOURNAMENT CREATE -->
    <div class="panel">
      <h3>Создать турнир</h3>
      <input id="tName" placeholder="Название турнира"/>
      <textarea id="tDesc" placeholder="Описание турнира (необязательно)" rows="2"></textarea>
      <textarea id="tData" placeholder="Список участников (каждый с новой строки, формат: Имя | https://wiki/ссылка)" rows="8"></textarea>
      <button onclick="doCreateTournament()">Создать турнир</button>
      <div id="tCreateStatus" class="log"></div>
    </div>

    <!-- TOURNAMENT MANAGE -->
    <div class="panel">
      <h3>Управление турниром</h3>
      <div id="activeTournamentInfo" class="log" style="margin-bottom:10px;">Нет активного турнира</div>
      <div class="row">
        <button onclick="doStartTournament()">🚀 Запустить турнир</button>
        <button onclick="doAdvanceRound()">⏭ Завершить раунд</button>
        <button onclick="doResetVotes()">🔄 Сбросить голоса</button>
        <button class="danger" onclick="doDeleteActiveTournament()">🗑 Удалить турнир</button>
      </div>
      <div id="tStatus" class="log"></div>
    </div>

    <!-- TOURNAMENT LIST -->
    <div class="panel">
      <h3>Все турниры</h3>
      <div id="tournamentList" class="log"></div>
    </div>

    <!-- IMPORT / EXPORT -->
    <div class="panel">
      <h3>Импорт / Экспорт</h3>
      <button onclick="doExportData()">📥 Экспорт JSON</button>
      <input type="file" onchange="doImportData(event)" style="margin-top:10px;"/>
    </div>

    <!-- USERS -->
    <div class="panel">
      <h3>Пользователи</h3>
      <div id="userList" class="log"></div>
    </div>

  </div>

  <!-- LOG -->
  <div class="panel">
    <h3>Лог</h3>
    <div id="log" class="log"></div>
  </div>

</div>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script src="js/tournament.js"></script>
<script src="js/auth.js"></script>
<script src="js/export.js"></script>

<script>
/* =========================
   UTILS
========================= */
function toast(msg) { log(msg); }
function log(msg) {
  const el = document.getElementById("log");
  if (el) el.textContent += "\n" + msg;
}

function escapeHTML(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* =========================
   AUTH
========================= */
function doLoginAdmin() {
  const pass = document.getElementById("adminPass").value;
  if (!pass) {
    document.getElementById("authStatus").innerText = "Введите пароль";
    return;
  }
  if (Auth.adminLogin(pass)) {
    localStorage.setItem("th_admin", "yes");
    document.getElementById("authStatus").innerText = "✔ Вход выполнен";
    document.getElementById("authPanel").classList.add("hidden");
    document.getElementById("adminControls").classList.remove("hidden");
    refreshAll();
  } else {
    document.getElementById("authStatus").innerText = "❌ Неверный пароль";
  }
}

function checkAuth() {
  if (Auth.isAdmin()) {
    document.getElementById("authPanel").classList.add("hidden");
    document.getElementById("adminControls").classList.remove("hidden");
    refreshAll();
  }
}

/* =========================
   TOURNAMENT CREATE
========================= */
function doCreateTournament() {
  const name = document.getElementById("tName").value.trim();
  const desc = document.getElementById("tDesc").value.trim();
  const raw = document.getElementById("tData").value;

  if (!name) { toast("Введите название турнира"); return; }
  if (!raw.trim()) { toast("Введите список участников"); return; }

  const players = raw.split("\n").map(line => {
    line = line.trim();
    if (!line) return null;
    const parts = line.split("|").map(s => s.trim());
    return {
      id: parts[0] || line,
      name: parts[0] || line,
      image: parts[1] || "",
      type: "character",
      description: ""
    };
  }).filter(Boolean);

  if (players.length < 2) { toast("Минимум 2 участника"); return; }

  const result = Tournament.createTournament(name, desc, players);
  if (result.success) {
    toast("✅ Турнир создан: " + escapeHTML(name));
    document.getElementById("tName").value = "";
    document.getElementById("tDesc").value = "";
    document.getElementById("tData").value = "";
    refreshAll();
  } else {
    toast("❌ " + (result.error || "Ошибка"));
  }
}

/* =========================
   TOURNAMENT MANAGE
========================= */
function doStartTournament() {
  const db = DB.getDB();
  const t = db.activeTournamentId ? Tournament.getTournament(db.activeTournamentId) : null;
  if (!t) { toast("Нет активного турнира. Создайте сначала."); return; }

  const result = Tournament.startTournament(t.id);
  if (result.success) {
    toast("🚀 Турнир запущен!");
    refreshAll();
  } else {
    toast("❌ " + (result.error || "Ошибка"));
  }
}

function doAdvanceRound() {
  const db = DB.getDB();
  const t = db.activeTournamentId ? Tournament.getTournament(db.activeTournamentId) : null;
  if (!t) { toast("Нет активного турнира"); return; }

  const result = Tournament.advanceRound(t.id);
  if (result.success) {
    if (result.finished) {
      toast("🏆 Турнир завершён! Победитель: " + escapeHTML(result.tournament.winner?.name || "?"));
    } else {
      toast("⏭ Раунд завершён, следующий начался");
    }
    refreshAll();
  } else {
    toast("❌ " + (result.error || "Ошибка"));
  }
}

function doResetVotes() {
  const db = DB.getDB();
  const t = db.activeTournamentId ? Tournament.getTournament(db.activeTournamentId) : null;
  if (!t) { toast("Нет активного турнира"); return; }

  // Используем глобальную функцию resetVotes из engine.js (без new!)
  resetVotes(t.id);
  toast("🔄 Голоса сброшены");
  refreshAll();
}

function doDeleteActiveTournament() {
  const db = DB.getDB();
  const t = db.activeTournamentId ? Tournament.getTournament(db.activeTournamentId) : null;
  if (!t) { toast("Нет активного турнира"); return; }
  if (!confirm("Точно удалить турнир \"" + t.title + "\"?")) return;

  Tournament.deleteTournament(t.id);
  toast("🗑 Турнир удалён");
  refreshAll();
}

/* =========================
   REFRESH UI
========================= */
function refreshAll() {
  refreshActiveTournament();
  refreshTournamentList();
  refreshUserList();
}

function refreshActiveTournament() {
  const db = DB.getDB();
  const t = db.activeTournamentId ? Tournament.getTournament(db.activeTournamentId) : null;
  const el = document.getElementById("activeTournamentInfo");
  if (!t) {
    el.innerHTML = "Нет активного турнира. Создайте новый выше.";
    return;
  }
  el.innerHTML = `<b>${escapeHTML(t.title)}</b> (${t.status}) — ${(t.players || []).length} участников, ${(t.rounds || []).length} раундов`;
}

function refreshTournamentList() {
  const list = Tournament.listTournaments();
  const el = document.getElementById("tournamentList");
  if (!list.length) {
    el.innerHTML = "Нет турниров";
    return;
  }
  el.innerHTML = list.map(t =>
    `<div style="margin-bottom:6px;">• <b>${escapeHTML(t.title)}</b> — ${t.status} — ${(t.players || []).length} участников — <a href="bracket.html?id=${encodeURIComponent(t.id)}" target="_blank">Сетка</a></div>`
  ).join("");
}

function refreshUserList() {
  const db = DB.getDB();
  const users = db.users || [];
  const el = document.getElementById("userList");
  if (!users.length) {
    el.innerHTML = "Нет пользователей";
    return;
  }
  el.innerHTML = users.map(u =>
    `<div style="margin-bottom:4px;">• ${escapeHTML(u.displayName || u.username)} (${u.authType || "guest"}) — голосов: ${u.votes || 0}</div>`
  ).join("");
}

/* =========================
   IMPORT / EXPORT
========================= */
function doExportData() {
  // Используем Export модуль
  if (typeof Export !== "undefined" && Export.downloadBackup) {
    Export.downloadBackup();
    toast("📥 Экспортировано");
  } else {
    // Fallback
    const db = DB.getDB();
    const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tournament-hub-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
    toast("📥 Экспортировано (fallback)");
  }
}

function doImportData(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Используем Export модуль
  if (typeof Export !== "undefined" && Export.importBackup) {
    Export.importBackup(file).then(ok => {
      if (ok) {
        toast("📤 Импорт завершён");
        refreshAll();
      } else {
        toast("❌ Ошибка импорта");
      }
    });
  } else {
    // Fallback
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        DB.saveDB(data);
        toast("📤 Импорт завершён (fallback)");
        refreshAll();
      } catch (err) {
        toast("❌ Ошибка импорта: " + err.message);
      }
    };
    reader.readAsText(file);
  }
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", checkAuth);
</script>
</body>
</html>
