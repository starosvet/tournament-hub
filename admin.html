<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление | Tournament Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-login { max-width: 400px; margin: 60px auto; text-align: center; }
    .admin-login input { width: 100%; margin-bottom: 12px; }
    .admin-section { margin-bottom: 32px; }
    .admin-section h3 { color: var(--accent); margin-bottom: 16px; font-size: 1.1em; }
    .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-opt { width: 40px; height: 40px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
    .color-opt:hover, .color-opt.active { border-color: #fff; transform: scale(1.1); }
    .theme-preview { background: var(--bg-3); border-radius: 12px; padding: 20px; margin-top: 12px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg); padding: 16px; border-radius: 12px; text-align: center; }
    .stat-num { font-size: 2em; font-weight: bold; color: var(--accent); }
    .stat-label { color: var(--text-3); font-size: 13px; margin-top: 4px; }
    .user-list { max-height: 300px; overflow-y: auto; }
    .user-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg); border-radius: 8px; margin-bottom: 6px; }
    .user-item .badge-type { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: auto; }
    .badge-fandom { background: rgba(59,130,246,0.2); color: var(--blue); }
    .badge-guest { background: rgba(148,163,184,0.2); color: var(--text-2); }
    .match-editor { display: grid; gap: 8px; }
    .match-row { display: flex; gap: 8px; align-items: center; background: var(--bg); padding: 10px; border-radius: 8px; }
    .match-row input { flex: 1; margin: 0; }
    .hidden-section { display: none; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; overflow-x: auto; }
    .tab-btn { padding: 8px 16px; border: none; background: transparent; color: var(--text-2); border-radius: 8px; cursor: pointer; white-space: nowrap; }
    .tab-btn.active { background: var(--bg-3); color: var(--text); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .export-box { background: var(--bg); padding: 16px; border-radius: 10px; font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; word-break: break-all; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">🏆 Tournament Hub</a>
      <nav>
        <a href="index.html">Главная</a>
        <a href="bracket.html">Сетка</a>
        <a href="history.html">История</a>
        <a href="rules.html">Правила</a>
        <a href="admin.html" class="active">Управление</a>
      </nav>
      <div class="nav-user" id="navUser"></div>
    </div>
  </header>

  <div class="container">
    <!-- LOGIN SCREEN -->
    <div id="adminLogin" class="admin-login">
      <div class="login-box">
        <h2>🔒 Панель управления</h2>
        <p>Введите пароль администратора</p>
        <input type="password" id="adminPass" placeholder="Пароль" onkeypress="if(event.key==='Enter')doLogin()">
        <button class="btn-admin" onclick="doLogin()" style="width:100%">Войти</button>
        <p style="margin-top:16px"><a href="index.html">← На главную</a></p>
      </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="adminDash" class="hidden-section">
      <h1 class="page-title">⚙️ Панель управления</h1>
      
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchAdminTab('site')">🎨 Сайт</button>
        <button class="tab-btn" onclick="switchAdminTab('tournaments')">🏆 Турниры</button>
        <button class="tab-btn" onclick="switchAdminTab('participants')">👥 Участники</button>
        <button class="tab-btn" onclick="switchAdminTab('rounds')">⏱️ Раунды</button>
        <button class="tab-btn" onclick="switchAdminTab('users')">🛡️ Пользователи</button>
        <button class="tab-btn" onclick="switchAdminTab('data')">💾 Данные</button>
      </div>
      
      <!-- TAB: SITE -->
      <div class="tab-panel active" id="panel-site">
        <div class="admin-grid">
          <div class="admin-card">
            <h3>🎨 Брендинг</h3>
            <label>Название сайта</label>
            <input type="text" id="siteName" placeholder="Tournament Hub">
            <label>Описание под заголовком</label>
            <input type="text" id="siteDesc" placeholder="Описание...">
            <label>Логотип (emoji или текст)</label>
            <input type="text" id="siteLogo" placeholder="🏆" maxlength="5">
            <button class="btn-primary" onclick="saveBranding()">Сохранить</button>
          </div>
          
          <div class="admin-card">
            <h3>🌈 Цветовая тема</h3>
            <p class="hint">Выберите акцент
