<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление · Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/oauth-init.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" class="active">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>
    <div class="container">
        <h1 class="page-title">⚙️ Панель управления</h1>
        <!-- Панель входа видна только если пользователь не админ -->
        <div id="authPanel" class="login-box page-enter" style="max-width:400px;">
            <h2>🔐 Вход в админку</h2>
            <p>Авторизуйтесь через Supabase с ролью <strong>admin</strong></p>
            <button class="btn-admin" style="width:100%;" onclick="Admin.doLogin()">🔐 Войти как администратор</button>
            <div id="authStatus" style="margin-top:16px;text-align:center;font-size:14px;"></div>
        </div>
        <div id="adminControls" class="hidden">
            <!-- Вкладки и содержимое админки (без изменений) -->
            <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:16px;">
                <button class="admin-tab active" data-tab="tournaments" onclick="Admin.switchTab('tournaments')">🏆 Турниры</button>
                <button class="admin-tab" data-tab="participants" onclick="Admin.switchTab('participants')">👥 Участники</button>
                <button class="admin-tab" data-tab="manage" onclick="Admin.switchTab('manage')">🎮 Управление</button>
                <button class="admin-tab" data-tab="users" onclick="Admin.switchTab('users')">👤 Пользователи</button>
                <button class="admin-tab" data-tab="moderation" onclick="Admin.switchTab('moderation')">🛡 Модерация</button>
                <button class="admin-tab" data-tab="settings" onclick="Admin.switchTab('settings')">⚙️ Настройки</button>
                <button class="admin-tab" data-tab="news" onclick="Admin.switchTab('news')">📰 Новости</button>
                <button class="admin-tab" data-tab="log" onclick="Admin.switchTab('log')">📋 Лог</button>
            </div>
            <!-- Остальное содержимое (оставляем как было, оно уже корректно) -->
            <div id="tab-tournaments" class="tab-content active">...</div>
            <div id="tab-participants" class="tab-content">...</div>
            <div id="tab-manage" class="tab-content">...</div>
            <div id="tab-users" class="tab-content">...</div>
            <div id="tab-moderation" class="tab-content">...</div>
            <div id="tab-settings" class="tab-content">...</div>
            <div id="tab-news" class="tab-content">...</div>
            <div id="tab-log" class="tab-content">...</div>
        </div>
    </div>
    <footer><p>Tournament Hub</p></footer>
    <script>
    document.addEventListener("DOMContentLoaded", async function() {
        let attempts = 0;
        const waitForInit = setInterval(() => {
            if (window.TH && window.TH.isReady) {
                clearInterval(waitForInit);
                // Проверяем админа и показываем/скрываем панель
                if (window.Admin && window.Admin.checkAuth) window.Admin.checkAuth();
                if (window.Auth && window.Auth.renderNavUser) window.Auth.renderNavUser();
                if (document.getElementById("tab-news")) {
                    setTimeout(() => { if (window.Admin && window.Admin.renderNewsAdmin) window.Admin.renderNewsAdmin(); }, 500);
                }
            }
            attempts++;
            if (attempts > 60) clearInterval(waitForInit);
        }, 100);
    });
    </script>
</body>
</html>
