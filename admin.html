<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Tournament Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">🏆 Tournament Hub</a>
    <nav>
      <a href="index.html">Главная</a>
      <a href="bracket.html">Сетка</a>
      <a href="history.html">История</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </div>
</header>

<main class="container">

<!-- LOGIN -->
<div id="loginPanel">
  <div class="login-box">
    <h2>⚙️ Панель администратора</h2>
    <input type="password" id="adminPass" placeholder="Пароль">
    <button onclick="enterAdmin()" class="btn-primary" style="width:100%;margin-top:15px">Войти</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none">

  <div class="admin-grid">
    <!-- Участники -->
    <div class="admin-card">
      <h3>👥 Участники</h3>
      <p class="hint">Формат: Имя | Ссылка (каждый с новой строки)</p>
      <textarea id="importBox" rows="6" placeholder="Веспера | https://wiki/vespera&#10;Фрида | https://wiki/frida&#10;Эйрвен | https://wiki/eirwen"></textarea>
      <div class="btn-row">
        <button onclick="importPlayers()" class="btn-primary">📥 Импорт</button>
        <button onclick="clearPlayers()" class="btn-danger">🗑️ Очистить</button>
      </div>
      <div id="playersCount" style="margin-top:10px;color:#64748b"></div>
      <div id="playersList" style="margin-top:15px;max-height:200px;overflow-y:auto"></div>
    </div>

    <!-- Турнир -->
    <div class="admin-card">
      <h3>🏆 Турнир</h3>
      <input type="text" id="tourName" placeholder="Название турнира">
      <input type="text" id="tourDesc" placeholder="Описание (необязательно)">
      <div class="btn-row">
        <button onclick="createTournament()" class="btn-primary">✨ Создать</button>
        <button onclick="nextRound()" class="btn-warn">⏭️ Следующий раунд</button>
      </div>
      <div id="tourStatus" style="margin-top:10px;color:#64748b"></div>
    </div>
  </div>

  <!-- Опасная зона -->
  <div class="admin-card danger-zone">
    <h3>⚠️ Опасная зона</h3>
    <button onclick="clearAll()" class="btn-danger">🗑️ Удалить ВСЕ данные</button>
    <button onclick="logoutAdmin();location.reload()" class="btn-secondary">🚪 Выйти</button>
  </div>

</div>

</main>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script src="js/bracket.js"></script>
<script src="js/auth.js"></script>

<script>
function enterAdmin() {
  if (loginAdmin(document.getElementById("adminPass").value)) {
    document.getElementById("loginPanel").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    updateStats();
  } else {
    alert("Неверный пароль");
  }
}

function importPlayers() {
  let lines = document.getElementById("importBox").value.split("\n").filter(x => x.trim());
  if (!lines.length) { alert("Введите участников"); return; }
  
  let db = getDB();
  let added = 0;
  let timestamp = Date.now();
  
  lines.forEach((line, idx) => {
    let parts = line.split("|").map(s => s.trim());
    let name = parts[0];
    let url = parts[1] || "#";
    // УНИКАЛЬНЫЙ ID: p_время_индекс
    let id = "p_" + timestamp + "_" + idx;
    
    if (!db.players.find(p => p.name === name)) {
      db.players.push({ id, name, url, wins: 0 });
      added++;
    }
  });
  
  saveDB(db);
  document.getElementById("importBox").value = "";
  updateStats();
  renderPlayersList();
  alert("✅ Добавлено " + added + " участников");
}

function renderPlayersList() {
  let db = getDB();
  let el = document.getElementById("playersList");
  if (!db.players.length) { el.innerHTML = ""; return; }
  
  let html = '<div style="display:flex;flex-direction:column;gap:6px">';
  db.players.forEach(p => {
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px;background:#0f1115;border-radius:8px">
      <img src="https://via.placeholder.com/28x28/1e293b/94a3b8?text=${encodeURIComponent(p.name[0])}" style="border-radius:50%">
      <span style="font-size:13px">${p.name}</span>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function clearPlayers() {
  if (!confirm("Удалить всех участников?")) return;
  let db = getDB();
  db.players = [];
  saveDB(db);
  updateStats();
  renderPlayersList();
}

function createTournament() {
  let db = getDB();
  if (db.players.length < 2) { alert("Нужно минимум 2 участника"); return; }
  
  let name = document.getElementById("tourName").value.trim() || "Турнир";
  let desc = document.getElementById("tourDesc").value.trim();
  
  // Очищаем старые голоса
  if (db.activeTournamentId) resetVotes(db.activeTournamentId);
  
  // Создаём турнир с КОПИЯМИ участников (чтобы не менять оригиналы)
  let playerCopies = db.players.map(p => ({...p}));
  let tournament = createBracket(playerCopies);
  tournament.name = name;
  tournament.description = desc;
  tournament.rounds[0].startedAt = new Date().toISOString();
  
  // Сохраняем маппинг id копий → оригиналы для обновления wins
  tournament._playerMap = {};
  tournament.rounds[0].matches.forEach(m => {
    let origA = db.players.find(op => op.name === m.a.name);
    let origB = db.players.find(op => op.name === m.b.name);
    if (origA) tournament._playerMap[m.a.id] = origA.id;
    if (origB) tournament._playerMap[m.b.id] = origB.id;
  });
  
  db.tournaments.push(tournament);
  db.activeTournamentId = tournament.id;
  saveDB(db);
  
  document.getElementById("tourName").value = "";
  document.getElementById("tourDesc").value = "";
  updateStats();
  alert("✅ Турнир \"" + name + "\" создан!\nРаундов: " + tournament.rounds.length);
}

function nextRound() {
  let db = getDB();
  let t = getActiveTournament(db);
  if (!t) { alert("Нет активного турнира"); return; }
  if (t.status !== "active") { alert("Турнир завершён"); return; }
  
  let idx = db.tournaments.findIndex(x => x.id === t.id);
  
  // Обновляем маппинг для текущего раунда
  let round = t.rounds[t.currentRound];
  round.matches.forEach(m => {
    if (m.a.name !== "—" && m.a.name !== "TBD") {
      let orig = db.players.find(op => op.name === m.a.name);
      if (orig) t._playerMap[m.a.id] = orig.id;
    }
    if (m.b.name !== "—" && m.b.name !== "TBD") {
      let orig = db.players.find(op => op.name === m.b.name);
      if (orig) t._playerMap[m.b.id] = orig.id;
    }
  });
  
  db.tournaments[idx] = finalizeRound(t, db.players);
  saveDB(db);
  
  let upd = getActiveTournament(db);
  if (upd.status === "completed") {
    alert("🏆 Турнир завершён!\nПобедитель: " + upd.winner.name);
  } else {
    alert("🔄 Следующий раунд: " + upd.rounds[upd.currentRound].name);
  }
  updateStats();
}

function clearAll() {
  if (!confirm("⚠️ Удалить ВСЁ? Это необратимо!")) return;
  localStorage.clear();
  location.reload();
}

function updateStats() {
  let db = getDB();
  document.getElementById("playersCount").textContent = "Участников: " + db.players.length;
  
  let t = getActiveTournament(db);
  if (t) {
    let status = t.status === "active" ? "🔥 Раунд " + (t.currentRound + 1) + " / " + t.rounds.length : "✅ Завершён";
    document.getElementById("tourStatus").innerHTML = "<strong>" + t.name + "</strong><br>" + status;
  } else {
    document.getElementById("tourStatus").textContent = "Нет активного турнира";
  }
}

if (isAdmin()) {
  document.getElementById("loginPanel").style.display = "none";
  document.getElementById("adminPanel").style.display = "block";
  updateStats();
  renderPlayersList();
}
</script>

</body>
</html>
