<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Tournament Hub</title>

  <link rel="stylesheet" href="style.css"/>

  <style>
    body {
      background: #0f1115;
      color: #eaeaea;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .panel {
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    button {
      background: #2d6cdf;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #1f5ed0;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f1115;
      color: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
      min-width: 200px;
    }

    .log {
      font-size: 12px;
      opacity: 0.8;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
<div class="wrap">

  <h1>⚙️ Tournament Hub Admin</h1>

  <!-- AUTH -->
  <div class="panel">
    <h3>Авторизация</h3>
    <input id="adminPass" type="password" placeholder="Пароль админа"/>
    <button onclick="loginAdmin()">Войти</button>
    <div id="authStatus" class="log"></div>
  </div>

  <!-- TOURNAMENT -->
  <div class="panel">
    <h3>Турнир</h3>

    <input id="tName" placeholder="Название турнира"/>
    <textarea id="tData" placeholder="Список участников (каждый с новой строки)"></textarea>

    <div class="row">
      <button onclick="createTournament()">Создать турнир</button>
      <button onclick="generateBracket()">Сгенерировать сетку</button>
      <button onclick="finalizeRound()">Завершить раунд</button>
    </div>

    <div id="tStatus" class="log"></div>
  </div>

  <!-- IMPORT / EXPORT -->
  <div class="panel">
    <h3>Импорт / Экспорт</h3>

    <button onclick="exportData()">Экспорт JSON</button>
    <input type="file" onchange="importData(event)"/>
  </div>

  <!-- LOG -->
  <div class="panel">
    <h3>Лог</h3>
    <div id="log" class="log"></div>
  </div>

</div>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>

<script>
/* =========================
   SAFE LAYER / FIX WRAPPER
========================= */

let CURRENT_TOURNAMENT = null;

/* ---- fallback utils ---- */
function toast(msg) {
  log(msg);
}

function log(msg) {
  const el = document.getElementById("log");
  el.textContent += "\n" + msg;
}

/* безопасный escape */
function escapeHTML(str = "") {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

/* =========================
   AUTH (stub + supabase-ready)
========================= */

function loginAdmin() {
  const pass = document.getElementById("adminPass").value;

  if (!pass) {
    document.getElementById("authStatus").innerText = "Введите пароль";
    return;
  }

  // временная логика (можно заменить на Supabase later)
  if (pass === "admin") {
    localStorage.setItem("admin", "1");
    document.getElementById("authStatus").innerText = "✔ Вход выполнен";
  } else {
    document.getElementById("authStatus").innerText = "❌ Неверный пароль";
  }
}

/* =========================
   TOURNAMENT CORE
========================= */

function createTournament() {
  const name = document.getElementById("tName").value;
  const raw = document.getElementById("tData").value;

  if (!name || !raw) {
    toast("Заполни название и участников");
    return;
  }

  const players = raw.split("\n").map(p => p.trim()).filter(Boolean);

  CURRENT_TOURNAMENT = {
    name,
    players,
    round: 0,
    bracket: []
  };

  saveDB();
  toast("Турнир создан: " + name);
}

function generateBracket() {
  if (!CURRENT_TOURNAMENT) {
    toast("Нет турнира");
    return;
  }

  const engine = new TournamentEngine();
  const shuffled = engine.shuffle(CURRENT_TOURNAMENT.players);

  CURRENT_TOURNAMENT.bracket = engine.createMatches(shuffled);
  CURRENT_TOURNAMENT.round = 1;

  saveDB();
  toast("Сетка создана");
}

function finalizeRound() {
  if (!CURRENT_TOURNAMENT) return;

  const engine = new TournamentEngine();
  const winners = CURRENT_TOURNAMENT.bracket.map(m => m.winner).filter(Boolean);

  if (winners.length < 2) {
    toast("Недостаточно победителей");
    return;
  }

  CURRENT_TOURNAMENT.bracket = engine.createMatches(winners);
  CURRENT_TOURNAMENT.round++;

  saveDB();
  toast("Раунд завершён");
}

/* =========================
   STORAGE (db fallback)
========================= */

function saveDB() {
  try {
    localStorage.setItem("tournament", JSON.stringify(CURRENT_TOURNAMENT));
  } catch (e) {
    console.error(e);
  }
}

function loadDB() {
  try {
    const data = localStorage.getItem("tournament");
    if (data) CURRENT_TOURNAMENT = JSON.parse(data);
  } catch (e) {
    console.error(e);
  }
}

/* =========================
   IMPORT / EXPORT
========================= */

function exportData() {
  const blob = new Blob(
    [JSON.stringify(CURRENT_TOURNAMENT, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "tournament.json";
  a.click();

  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      CURRENT_TOURNAMENT = JSON.parse(e.target.result);
      saveDB();
      toast("Импорт завершён");
    } catch (err) {
      toast("Ошибка импорта");
    }
  };

  reader.readAsText(file);
}

/* =========================
   INIT
========================= */

loadDB();

if (CURRENT_TOURNAMENT) {
  toast("Загружен турнир: " + CURRENT_TOURNAMENT.name);
}
</script>

</body>
</html>
