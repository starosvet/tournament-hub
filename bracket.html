<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетка | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/elo.js"></script>
    <script src="js/render-bracket.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html" class="active">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container page-enter">
        <div class="bracket-header">
            <h1>🏆 Турнирная сетка</h1>
            <span id="statusBadge" class="badge status-active">Загрузка...</span>
        </div>
        <p class="bracket-sub" id="bracketSub">Загрузка турнира...</p>

        <div id="roundInfo" style="display:none;">
            <div class="round-info">
                <div class="round-info-header">
                    <span>Текущий раунд: <b id="roundName">—</b></span>
                    <span class="round-progress" id="roundProgress">Матч 0 / 0</span>
                </div>
                <div class="round-timer-row">
                    <span class="timer-icon">⏱</span>
                    <span class="timer-label">До конца голосования:</span>
                    <span id="timerDisplay" style="font-family:monospace;font-size:1.3em;font-weight:700;color:var(--red);">00:00:00</span>
                </div>
            </div>
        </div>

        <div id="bracketGrid" class="bracket-grid">
            <p style="color:var(--text-3);text-align:center;padding:60px 20px;">Загрузка сетки...</p>
        </div>

        <div id="championArea"></div>
    </div>

    <footer>
        <p id="footerText">© 2026 Tournament Hub</p>
    </footer>

    <script>
        loadBracketPage();
    </script>
</body>
</html>
