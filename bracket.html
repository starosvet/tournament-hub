<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетка | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/elo.js"></script>
    <script src="js/render-bracket.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html" class="active">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container page-enter">
        <div class="bracket-header">
            <h1>🏆 Турнирная сетка</h1>
            <span id="statusBadge" class="badge status-active">Загрузка...</span>
        </div>
        <p class="bracket-sub" id="bracketSub">Загрузка турнира...</p>

        <div id="roundInfo" style="display:none;">
            <div class="round-info">
                <div class="round-info-header">
                    <span>Текущий раунд: <b id="roundName">—</b></span>
                    <span class="round-progress" id="roundProgress">Матч 0 / 0</span>
                </div>
                <div class="round-timer-row">
                    <span class="timer-icon">⏱</span>
                    <span class="timer-label">До конца голосования:</span>
                    <span id="timerDisplay" style="font-family:monospace;font-size:1.3em;font-weight:700;color:var(--red);">00:00:00</span>
                </div>
            </div>
        </div>

        <div id="bracketGrid" class="bracket-grid">
            <p style="color:var(--text-3);text-align:center;padding:60px 20px;">Загрузка сетки...</p>
        </div>

        <div id="championArea"></div>
    </div>

    <footer>
        <p id="footerText">© 2026 Tournament Hub</p>
    </footer>

    <script>
        let currentTournament = null;
        let timerInterval = null;

        function loadBracket() {
            let db = getDB();
            let t = getActiveTournament(db);
            currentTournament = t;
            
            if (!t) {
                document.getElementById('bracketSub').textContent = 'Нет активного турнира. Создайте его в админ-панели.';
                document.getElementById('statusBadge').textContent = 'Нет турнира';
                document.getElementById('statusBadge').className = 'badge';
                document.getElementById('statusBadge').style.background = 'var(--bg-3)';
                document.getElementById('statusBadge').style.color = 'var(--text-3)';
                return;
            }

            // Статус
            let isActive = t.status === 'active';
            document.getElementById('statusBadge').textContent = isActive ? '🔥 Активен' : '✅ Завершён';
            document.getElementById('statusBadge').className = 'badge ' + (isActive ? 'status-active' : 'status-completed');
            document.getElementById('bracketSub').textContent = t.name + (t.description ? ' — ' + t.description : '');

            // Инфо раунда
            if (isActive && t.currentRound < t.rounds.length) {
                let round = t.rounds[t.currentRound];
                document.getElementById('roundInfo').style.display = 'block';
                document.getElementById('roundName').textContent = round.name;
                
                let totalMatches = round.matches.length;
                let doneMatches = round.matches.filter(m => m.done).length;
                document.getElementById('roundProgress').textContent = `Матч ${doneMatches} / ${totalMatches}`;
                
                // Таймер
                if (timerInterval) clearInterval(timerInterval);
                updateTimer();
                timerInterval = setInterval(updateTimer, 1000);
            } else {
                document.getElementById('roundInfo').style.display = 'none';
                if (timerInterval) clearInterval(timerInterval);
            }

            // Рендер сетки
            renderBracket(t, db.players);

            // Чемпион
            if (t.status === 'completed' && t.winner) {
                document.getElementById('championSection').style.display = 'block';
                document.getElementById('championName').textContent = t.winner.name;
                document.getElementById('championImg').src = t.winner.url !== '#' ? t.winner.url : '';
                document.getElementById('championImg').onerror = function() { this.style.display='none'; };
                let wins = db.players.find(p => p.name === t.winner.name)?.wins || 0;
                document.getElementById('championWins').textContent = `Побед в турнирах: ${wins}`;
            } else {
                document.getElementById('championSection').style.display = 'none';
            }

            // Админ-панель
            if (isAdmin() && isActive) {
                document.getElementById('adminFloat').classList.remove('hidden');
            } else {
                document.getElementById('adminFloat').classList.add('hidden');
            }
        }

        function updateTimer() {
            if (!currentTournament) return;
            let round = currentTournament.rounds[currentTournament.currentRound];
            if (!round || !round.startedAt) return;
            
            let left = getTimeLeft(round.startedAt, currentTournament.config?.voteDurationHours || 24);
            document.getElementById('timerDisplay').textContent = formatDuration(left);
            
            // Автозавершение по таймеру
            if (left <= 0 && round.isActive) {
                let db = getDB();
                let updated = autoFinalizeRound(currentTournament, db.players);
                let idx = db.tournaments.findIndex(x => x.id === updated.id);
                db.tournaments[idx] = updated;
                saveDB(db);
                loadBracket();
                toast('Раунд автоматически завершён по таймеру!');
            }
        }

        function doVote(roundIdx, matchIdx, side) {
            if (!currentTournament) return;
            
            let res = voteInMatch(currentTournament, roundIdx, matchIdx, side);
            if (!res.ok) {
                toast(res.err);
                return;
            }
            
            // Сохраняем
            let db = getDB();
            let idx = db.tournaments.findIndex(t => t.id === currentTournament.id);
            db.tournaments[idx] = currentTournament;
            saveDB(db);
            
            // Анимация
            toast(side === 0 ? '✓ Голос за ' + currentTournament.rounds[roundIdx].matches[matchIdx].a.name : '✓ Голос за ' + currentTournament.rounds[roundIdx].matches[matchIdx].b.name);
            
            // Перерендер с анимацией
            setTimeout(() => loadBracket(), 300);
        }

        // Админ-функции
        function adminNextRound() {
            if (!isAdmin()) { toast('Нет доступа'); return; }
            if (!currentTournament) { toast('Нет турнира'); return; }
            
            let db = getDB();
            let res = finalizeRound(currentTournament, db.players);
            if (!res.ok) {
                toast(res.err);
                return;
            }
            
            let idx = db.tournaments.findIndex(t => t.id === currentTournament.id);
            db.tournaments[idx] = res.tournament;
            saveDB(db);
            toast('Раунд завершён администратором!');
            loadBracket();
        }

        function adminResetVotes() {
            if (!isAdmin()) return;
            if (!currentTournament) return;
            if (!confirm('Сбросить все голоса текущего раунда?')) return;
            
            resetVotes(currentTournament.id);
            let round = currentTournament.rounds[currentTournament.currentRound];
            round.matches.forEach(m => { m.votesA = 0; m.votesB = 0; });
            
            let db = getDB();
            let idx = db.tournaments.findIndex(t => t.id === currentTournament.id);
            db.tournaments[idx] = currentTournament;
            saveDB(db);
            toast('Голоса сброшены!');
            loadBracket();
        }

        function adminResetTournament() {
            if (!isAdmin()) return;
            if (!currentTournament) return;
            if (!confirm('СБРОСИТЬ весь турнир? Все прогресс будет потерян!')) return;
            
            resetVotes(currentTournament.id);
            currentTournament.currentRound = 0;
            currentTournament.status = 'active';
            currentTournament.winner = null;
            currentTournament.completedAt = null;
            currentTournament.rounds.forEach((r, i) => {
                r.isActive = i === 0;
                r.startedAt = i === 0 ? new Date().toISOString() : null;
                r.endedAt = null;
                r.matches.forEach(m => {
                    m.votesA = 0; m.votesB = 0; m.winner = null; m.done = false;
                });
            });
            
            let db = getDB();
            let idx = db.tournaments.findIndex(t => t.id === currentTournament.id);
            db.tournaments[idx] = currentTournament;
            saveDB(db);
            toast('Турнир сброшен!');
            loadBracket();
        }

        // Инициализация
        loadBracket();
        initAuth();
    </script>
</body>
</html>
