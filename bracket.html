<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетка | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/tournament.js"></script>
    <script type="module">
  import { supabase, getUser, getFingerprint } from './js/supabase.js'

  // --- Голосование ---
  async function doVote(matchId, playerNum) {
    const fp = getFingerprint()
    const { data, error } = await supabase.rpc('vote', {
      p_match_id: matchId,
      p_player_num: playerNum,
      p_fingerprint: fp
    })
    
    if (data === true) {
      console.log('Голос засчитан!')
      // Счётчик обновится сам через Realtime
    } else {
      alert('Уже голосовали или турнир не активен')
    }
  }

  // --- Подписка на изменения матча (live-голоса) ---
  function watchMatch(matchId) {
    supabase
      .channel('match-' + matchId)
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'matches',
        filter: 'id=eq.' + matchId
      }, (payload) => {
        // payload.new.votes1, payload.new.votes2 — обнови UI
        document.getElementById('votes-' + matchId + '-1').textContent = payload.new.votes1
        document.getElementById('votes-' + matchId + '-2').textContent = payload.new.votes2
      })
      .subscribe()
  }

  // --- Загрузка турнира ---
  async function loadTournament(id) {
    const { data } = await supabase
      .from('tournaments')
      .select(`
        *,
        players(*),
        rounds(*, matches(*, player1:player1_id(*), player2:player2_id(*)))
      `)
      .eq('id', id)
      .single()
    
    return data
  }

  // --- Чат: отправка ---
  async function sendChat(text) {
    const user = await getUser()
    if (!user) { alert('Войдите'); return }
    
    await supabase.from('chat_messages').insert({
      user_id: user.id,
      username: user.user_metadata?.username || user.email,
      text: text.trim()
    })
  }

  // --- Чат: подписка ---
  supabase
    .channel('chat')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages'
    }, (payload) => {
      appendMessage(payload.new) // твоя функция рендера
    })
    .subscribe()

  // --- Комментарии ---
  async function addComment(tournamentId, text) {
    const user = await getUser()
    if (!user) return
    
    await supabase.from('comments').insert({
      tournament_id: tournamentId,
      user_id: user.id,
      username: user.user_metadata?.username || user.email,
      text: text.trim()
    })
  }

  // Экспортируем в глобальную область для onclick в HTML
  window.doVote = doVote
  window.sendChat = sendChat
  window.addComment = addComment
</script>
    <script src="js/auth.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/render-bracket.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html" class="active">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container">
        <div class="bracket-header" id="bracket-header">
            <h1>🏆 Турнирная сетка</h1>
        </div>
        <p class="bracket-sub" id="bracket-sub">Выберите турнир на главной</p>

        <div id="bracket-container">
            <div class="skeleton" style="height:400px;border-radius:20px;"></div>
        </div>

        <!-- Комментарии -->
        <div style="margin-top:48px;">
            <h2 class="section-title">💬 Комментарии</h2>
            <div id="comments-box" style="background:var(--bg-3);border:1px solid var(--border);border-radius:16px;overflow:hidden;">
                <div id="comments-list" style="max-height:400px;overflow-y:auto;"></div>
                <div style="padding:16px 20px;border-top:1px solid var(--border);">
                    <textarea id="commentText" placeholder="Написать комментарий..." style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px;color:var(--text);resize:vertical;min-height:80px;"></textarea>
                    <button class="btn-primary" style="margin-top:10px;" onclick="postComment()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Tournament Hub</p>
    </footer>

    <script>
        function postComment() {
            const text = document.getElementById("commentText").value;
            const params = new URLSearchParams(window.location.search);
            const tid = params.get("id");
            if (!tid) return;

            if (!DB.getCurrentUser()) {
                alert("Войдите, чтобы оставлять комментарии");
                return;
            }

            Comments.addComment(tid, text);
            document.getElementById("commentText").value = "";
            loadComments();
        }

        function loadComments() {
            const params = new URLSearchParams(window.location.search);
            const tid = params.get("id");
            if (!tid) return;
            Comments.renderComments(tid, document.getElementById("comments-list"));
        }

        document.addEventListener("DOMContentLoaded", function() {
            Auth.renderNavUser();
            Auth.checkFandomAutoAdmin();
            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin && Auth.isAdmin()) navAdmin.classList.remove("hidden");

            // Рендерим сетку
            if (typeof RenderBracket !== "undefined" && RenderBracket.renderBracket) {
                RenderBracket.renderBracket();
            }

            // Загружаем комментарии
            loadComments();
        });
    </script>
</body>
</html>
