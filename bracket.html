<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетка | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/oauth-init.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/tournament.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/render-bracket.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html" class="active">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container">
        <div class="bracket-header" id="bracket-header">
            <h1>🏆 Турнирная сетка</h1>
        </div>
        <p class="bracket-sub" id="bracket-sub">Выберите турнир на главной</p>

        <div id="bracket-container">
            <div class="skeleton" style="height:400px;border-radius:20px;"></div>
        </div>

        <!-- Комментарии -->
        <div style="margin-top:48px;">
            <h2 class="section-title">💬 Комментарии</h2>
            <div id="comments-box" style="background:var(--bg-3);border:1px solid var(--border);border-radius:16px;overflow:hidden;">
                <div id="comments-list" style="max-height:400px;overflow-y:auto;"></div>
                <div style="padding:16px 20px;border-top:1px solid var(--border);">
                    <textarea id="commentText" placeholder="Написать комментарий..." style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px;color:var(--text);resize:vertical;min-height:80px;"></textarea>
                    <button class="btn-primary" style="margin-top:10px;" onclick="postComment()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Tournament Hub</p>
    </footer>

    <script>
        async function postComment() {
            const text = document.getElementById("commentText").value;
            const params = new URLSearchParams(window.location.search);
            const tid = params.get("id");
            if (!tid) return;

            // FIX: await для async getCurrentUser
            const user = await DB.getCurrentUser();
            if (!user) {
                alert("Войдите, чтобы оставлять комментарии");
                return;
            }

            const result = await Comments.addComment(tid, text);
            if (result.error) {
                alert(result.error.message || "Ошибка отправки");
                return;
            }

            document.getElementById("commentText").value = "";
            await loadComments();
        }

        async function loadComments() {
            const params = new URLSearchParams(window.location.search);
            const tid = params.get("id");
            if (!tid) return;
            await Comments.renderComments(tid, document.getElementById("comments-list"));
            Comments.subscribeToComments(tid, document.getElementById("comments-list"));
        }

        document.addEventListener("DOMContentLoaded", async function() {
            Auth.renderNavUser();
            Auth.checkFandomAutoAdmin();
            // FIX: Используем isAdminSync
            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin && Auth.isAdminSync && Auth.isAdminSync()) navAdmin.classList.remove("hidden");

            // Рендерим сетку
            if (typeof RenderBracket !== "undefined" && RenderBracket.renderBracket) {
                await RenderBracket.renderBracket();
            }

            // Загружаем комментарии
            await loadComments();
        });
    </script>
</body>
</html>
