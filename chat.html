<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html" class="active">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container">
        <div class="grid-2">
            <div>
                <h2 class="section-title">💬 Общий чат</h2>
                <div id="chat-messages" style="background:var(--bg-3);border:1px solid var(--border);border-radius:16px;height:500px;overflow-y:auto;padding:16px;">
                    <div style="text-align:center;color:var(--text-3);padding:40px;">Загрузка сообщений...</div>
                </div>
                <div style="display:flex;gap:10px;margin-top:12px;">
                    <input type="text" id="chat-input" placeholder="Написать сообщение..." style="flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px;color:var(--text);">
                    <button class="btn-primary" onclick="sendChat()">Отправить</button>
                </div>
                <p id="chat-login-msg" style="color:var(--text-3);font-size:13px;margin-top:8px;">
                    <a href="login.html">🔐 Войдите</a>, чтобы писать в чат
                </p>
            </div>

            <div>
                <h2 class="section-title">👥 Онлайн</h2>
                <div class="card" style="padding:20px;">
                    <p style="color:var(--text-3);font-size:14px;">Локальный чат — онлайн статус недоступен</p>
                </div>

                <h2 class="section-title" style="margin-top:24px;">📊 Статистика чата</h2>
                <div class="card" style="padding:20px;" id="chat-stats">
                    <p style="color:var(--text-3);">Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Tournament Hub</p>
    </footer>

    <script>
        const CHAT_KEY = "tournament_hub_chat";

        function escapeHTML(text) {
            if (!text) return "";
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getChatMessages() {
            try {
                const raw = localStorage.getItem(CHAT_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveChatMessages(msgs) {
            localStorage.setItem(CHAT_KEY, JSON.stringify(msgs.slice(-200)));
        }

        function sendChat() {
            const user = DB.getCurrentUser();
            if (!user) {
                alert("Войдите, чтобы писать в чат");
                return;
            }

            const input = document.getElementById("chat-input");
            const text = input.value.trim();
            if (!text) return;

            const msgs = getChatMessages();
            msgs.push({
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                userId: user.id,
                username: user.displayName || user.username,
                text: text,
                createdAt: Date.now()
            });

            saveChatMessages(msgs);
            input.value = "";
            renderChat();
        }

        function renderChat() {
            const container = document.getElementById("chat-messages");
            const msgs = getChatMessages();

            if (!msgs.length) {
                container.innerHTML = `<div style="text-align:center;color:var(--text-3);padding:40px;">Нет сообщений. Напишите первое!</div>`;
            } else {
                container.innerHTML = msgs.map(m => `
                    <div class="chat-message" style="padding:10px 0;border-bottom:1px solid var(--border);">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                            <strong style="color:var(--accent);font-size:13px;">${escapeHTML(m.username)}</strong>
                            <span style="color:var(--text-3);font-size:11px;">${new Date(m.createdAt).toLocaleTimeString("ru-RU")}</span>
                        </div>
                        <div style="color:var(--text-2);font-size:14px;">${escapeHTML(m.text)}</div>
                    </div>
                `).join("");
            }

            container.scrollTop = container.scrollHeight;

            const stats = document.getElementById("chat-stats");
            const uniqueUsers = [...new Set(msgs.map(m => m.userId))];
            stats.innerHTML = `
                <div class="stat-badge">💬 Сообщений: ${msgs.length}</div>
                <div class="stat-badge" style="margin-top:8px;">👥 Пользователей: ${uniqueUsers.length}</div>
            `;
        }

        document.addEventListener("DOMContentLoaded", function() {
            Auth.renderNavUser();
            Auth.checkFandomAutoAdmin();
            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin && Auth.isAdmin()) navAdmin.classList.remove("hidden");

            renderChat();

            document.getElementById("chat-input").addEventListener("keydown", function(e) {
                if (e.key === "Enter") sendChat();
            });
        });
    </script>
</body>
</html>
