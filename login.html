<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo" id="siteLogoLink">🏆 Tournament Hub</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="bracket.html">Сетка</a>
                <a href="history.html">История</a>
                <a href="chat.html">💬 Чат</a>
                <a href="rules.html">Правила</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="admin.html" id="navAdmin" class="hidden">⚙️ Управление</a>
            </nav>
            <div class="nav-user" id="navUser"></div>
        </div>
    </header>

    <div class="container">
        <div class="login-box page-enter">
            <h2>🔐 Вход</h2>
            <p>Выберите способ авторизации</p>

            <div id="loginForm">
                <label>Ваш никнейм</label>
                <input type="text" id="loginUsername" placeholder="username">

                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••••">

                <button class="btn-primary" style="width:100%;margin-top:20px;" onclick="doLogin()">🔐 Войти</button>
                <button class="btn-secondary" style="width:100%;margin-top:12px;" onclick="doRegister()">📝 Регистрация</button>

                <div class="error" id="loginError" style="color:var(--red);margin-top:16px;text-align:center;"></div>
            </div>

            <p style="margin-top:24px;color:var(--text-3);font-size:13px;text-align:center;">
                Гостевой аккаунт хранится локально. Вы сможете голосовать и оставлять комментарии.
            </p>
        </div>
    </div>

    <footer>
        <p>Tournament Hub</p>
    </footer>

    <script>
        function doLogin() {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value;
            const err = document.getElementById("loginError");

            const result = Auth.login(username, password);
            if (result.success) {
                location.href = "index.html";
            } else {
                err.textContent = result.error || "Ошибка входа";
            }
        }

        function doRegister() {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value;
            const err = document.getElementById("loginError");

            const result = Auth.register(username, password);
            if (result.success) {
                location.href = "index.html";
            } else {
                err.textContent = result.error || "Ошибка регистрации";
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") doLogin();
        });

        document.addEventListener("DOMContentLoaded", function() {
            Auth.renderNavUser();
            Auth.checkFandomAutoAdmin();
            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin && Auth.isAdmin()) navAdmin.classList.remove("hidden");
        });
    </script>
</body>
</html>
