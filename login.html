<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | Tournament Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">🏆 Tournament Hub</a>
    <nav>
      <a href="index.html">Главная</a>
      <a href="bracket.html">Сетка</a>
      <a href="history.html">История</a>
      <a href="rules.html">Правила</a>
    </nav>
    <div id="navUser" class="nav-user"></div>
  </div>
</header>

<main class="container">
  <div class="login-box">
    <h2>🔐 Вход</h2>
    <p>Выберите способ авторизации</p>
    
    <div style="margin-bottom: 24px;">
      <button class="btn-primary" style="width:100%; margin-bottom:10px;" onclick="showTab('fandom')">Войти через Fandom Wiki</button>
      <button class="btn-secondary" style="width:100%;" onclick="showTab('local')">Войти как гость</button>
    </div>
    
    <div id="tab-fandom" class="hidden">
      <label>Ник на Fandom</label>
      <input type="text" id="fandomName" placeholder="Например: IvanIvanov">
      
      <label>Домен вики (без https://)</label>
      <input type="text" id="wikiDomain" value="chickengun-fanon.fandom.com/ru" placeholder="chickengun-fanon.fandom.com/ru">
      
      <div id="verifyBox" class="hidden" style="margin: 16px 0;">
        <p class="hint">Вставьте этот код в профиль на Fandom и нажмите «Проверить»:</p>
        <div class="verify-code" id="verifyCode"></div>
        <p class="hint">Код действует 1 час. Вставьте его в описание профиля или в любую правку.</p>
      </div>
      
      <div class="btn-row">
        <button class="btn-primary" id="btnStartVerify" onclick="startVerify()">Получить код</button>
        <button class="btn-warn hidden" id="btnCheckVerify" onclick="checkVerify()">Проверить</button>
      </div>
    </div>
    
    <div id="tab-local" class="hidden">
      <label>Ваш никнейм</label>
      <input type="text" id="localName" placeholder="Введите имя">
      <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="loginLocal()">Войти</button>
    </div>
    
    <p class="hint" style="text-align:center; margin-top:20px;">
      <a href="index.html">← На главную</a>
    </p>
  </div>
</main>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script src="js/auth.js"></script>

<script>
function showTab(tab) {
  document.getElementById('tab-fandom').classList.add('hidden');
  document.getElementById('tab-local').classList.add('hidden');
  document.getElementById('tab-' + tab).classList.remove('hidden');
}

function startVerify() {
  let name = document.getElementById('fandomName').value.trim();
  if (!name) return toast('Введите ник');
  let res = startFandomVerify(name);
  if (!res.ok) return toast(res.err);
  document.getElementById('verifyCode').textContent = res.code;
  document.getElementById('verifyBox').classList.remove('hidden');
  document.getElementById('btnStartVerify').classList.add('hidden');
  document.getElementById('btnCheckVerify').classList.remove('hidden');
  toast('Код сгенерирован! Вставьте его на Fandom.');
}

async function checkVerify() {
  let name = document.getElementById('fandomName').value.trim();
  let domain = document.getElementById('wikiDomain').value.trim();
  if (!domain) domain = 'chickengun-fanon.fandom.com/ru';
  let res = await checkFandomVerify(name, domain);
  if (!res.ok) return toast(res.err);
  toast('✅ Успешно! Добро пожаловать, ' + res.user.fandomName);
  setTimeout(() => location.href = 'index.html', 1000);
}

function loginLocal() {
  let name = document.getElementById('localName').value.trim();
  if (!name) return toast('Введите никнейм');
  let db = getDB();
  let id = 'local_' + name.toLowerCase().replace(/[^a-z0-9а-яё]/g, '_');
  let user = db.users.find(u => u.id === id);
  if (!user) {
    user = {
      id: id,
      fandomName: name,
      status: 'local',
      createdAt: new Date().toISOString()
    };
    db.users.push(user);
    saveDB(db);
  }
  setCurrentUser(user.id);
  toast('✅ Вошли как ' + name);
  setTimeout(() => location.href = 'index.html', 500);
}

function toast(msg) {
  let t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}
</script>

</body>
</html>
