<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | Tournament Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">🏆 Tournament Hub</a>
    <nav>
      <a href="index.html">Главная</a>
      <a href="bracket.html">Сетка</a>
      <a href="history.html">История</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="login-box" style="max-width:480px;margin:40px auto">
    <h2>🔐 Вход через Fandom Wiki</h2>
    <p class="hint">Введите ник на Fandom и домен вики для верификации</p>
    
    <div id="step1">
      <label>Ник на Fandom</label>
      <input type="text" id="fandomName" placeholder="Например: IvanPetrov">
      
      <label>Домен вики</label>
      <input type="text" id="wikiDomain" placeholder="your-wiki.fandom.com">
      
      <button onclick="startVerify()" class="btn-primary" style="width:100%;margin-top:15px">Получить код</button>
    </div>
    
    <div id="step2" style="display:none;margin-top:20px">
      <div class="verify-code" id="verifyCode"></div>
      <p class="hint">Сделайте правку на Fandom с этим кодом в описании, затем нажмите "Проверить"</p>
      <button onclick="checkVerify()" class="btn-primary" style="width:100%">✅ Проверить</button>
      <div id="verifyStatus" style="margin-top:15px"></div>
    </div>
  </div>
</main>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script src="js/auth.js"></script>

<script>
let currentName = "";
let currentDomain = "";

function startVerify() {
  let name = document.getElementById("fandomName").value.trim();
  let domain = document.getElementById("wikiDomain").value.trim();
  
  if (!name || !domain) { alert("Заполните все поля"); return; }
  
  currentName = name;
  currentDomain = domain;
  
  let res = startFandomVerify(name);
  if (!res.ok) { alert(res.err); return; }
  
  document.getElementById("verifyCode").textContent = res.code;
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

async function checkVerify() {
  let st = document.getElementById("verifyStatus");
  st.innerHTML = '<span style="color:#3b82f6">⏳ Проверяем...</span>';
  
  let res = await checkFandomVerify(currentName, currentDomain);
  
  if (res.ok) {
    st.innerHTML = '<span style="color:#22c55e">✅ Успешно! Перенаправляем...</span>';
    setTimeout(() => location.href = "index.html", 1500);
  } else {
    st.innerHTML = `<span style="color:#ef4444">❌ ${res.err}</span>`;
  }
}
</script>

</body>
</html>
